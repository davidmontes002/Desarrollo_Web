<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 21 - Formularios y Operaciones</title>
    <link rel="stylesheet" href="estilos21.css">
</head>

<body>

    <nav style="margin-bottom: 30px;">
        <a href="../index.html" class="btn-regresar">Volver al Menú Principal</a>
    </nav>

    <h1>Calculadora Aritmética</h1>
    <p>Ingresa dos números en las cajas de texto y presiona el botón de la operación que deseas ejecutar.</p>

    <div class="contenedor">
        <form id="calculadora-form" onsubmit="event.preventDefault();">
            <div class="grupo-input">
                <label for="numero1">Número 1:</label>
                <input type="number" id="numero1" placeholder="Ingresa el primer valor" required>
            </div>

            <div class="grupo-input">
                <label for="numero2">Número 2:</label>
                <input type="number" id="numero2" placeholder="Ingresa el segundo valor" required>
            </div>

            <div class="botones-operacion">
                <button type="button" onclick="calcular('suma')">Sumar (+)</button>
                <button type="button" onclick="calcular('resta')">Restar (-)</button>
                <button type="button" onclick="calcular('division')">Dividir (/)</button>
                <button type="button" onclick="calcular('exponente')">Exponenciar (**)</button>
            </div>
        </form>

        <div id="resultado" class="caja-resultado">
            <em>El resultado aparecerá aquí...</em>
        </div>
    </div>

    <script src="scripts21.js"></script>
</body>

</html>
